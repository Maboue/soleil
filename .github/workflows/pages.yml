name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  # Public: this becomes part of the built frontend bundle.
  # Set in GitHub: Settings -> Secrets and variables -> Actions -> Variables
  VITE_CONVEX_URL: ${{ vars.VITE_CONVEX_URL }}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Assert required env
        run: |
          if [ -z "${VITE_CONVEX_URL}" ]; then
            echo "Missing VITE_CONVEX_URL. Set it in GitHub Actions Variables."
            exit 1
          fi
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

